<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find Your Booth — E-Voting Portal</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: '#FF9933', 'indian-green': '#138808', 'indian-blue': '#000080' } } }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
</head>
<body class="flex flex-col min-h-screen bg-slate-50">
  <main class="flex-1 flex flex-col items-center justify-center py-16 px-4 w-full">
    <div class="w-full max-w-[480px] text-center mb-8">
      <h1 class="text-3xl font-black text-slate-900 mb-3 tracking-tight">Find Your Booth</h1>
      <p class="text-sm text-slate-600 font-medium">Locate your polling station using your EPIC number.</p>
    </div>

    <!-- Booth Search Card -->
    <div class="w-full max-w-[480px] bg-white rounded-3xl shadow-2xl border border-slate-200 overflow-hidden relative">
      <div class="h-2 w-full flex">
        <div class="flex-1 bg-primary"></div>
        <div class="flex-1 bg-white"></div>
        <div class="flex-1 bg-indian-green"></div>
      </div>

      <div class="p-8 sm:p-10">
        <form class="flex flex-col gap-8" onsubmit="event.preventDefault(); document.getElementById('booth-result').classList.remove('hidden');">
          <div class="space-y-6">
            <div>
              <label class="block text-[11px] font-black text-slate-500 uppercase tracking-widest mb-2 px-1">EPIC Number (Voter ID)</label>
              <div class="relative group">
                <span class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none material-symbols-outlined text-slate-400 group-focus-within:text-primary transition-colors">badge</span>
                <input type="text" required class="w-full pl-14 pr-4 py-4 rounded-xl border-2 border-slate-200 bg-slate-50 focus:bg-white focus:border-primary focus:ring-0 outline-none text-base font-bold transition-all" placeholder="e.g. ABC1234567">
              </div>
            </div>
          </div>

          <button type="submit" class="w-full py-4 rounded-xl bg-gradient-to-r from-primary to-orange-500 text-white font-extrabold text-base shadow-lg shadow-orange-500/25 hover:shadow-orange-500/40 transition-all flex items-center justify-center gap-3">
            Search Booth <span class="material-symbols-outlined">search</span>
          </button>
        </form>

        <div id="booth-result" class="hidden mt-8 p-6 rounded-2xl bg-slate-50 border border-slate-200 relative overflow-hidden">
          <h3 class="text-sm font-black text-slate-800 uppercase tracking-widest mb-2 border-b pb-2">Booth Details</h3>
          <div class="mt-4 space-y-3">
             <div class="flex gap-2">
                <span class="material-symbols-outlined text-indian-green">location_on</span>
                <div>
                   <p class="text-sm font-bold text-slate-900">Government High School, Block A</p>
                   <p class="text-xs text-slate-500">Room No 12, MG Road, Ward 45</p>
                </div>
             </div>
             <div class="flex gap-2 mt-2">
                <span class="material-symbols-outlined text-primary">schedule</span>
                <div>
                   <p class="text-sm font-bold text-slate-900">Poll Timings</p>
                   <p class="text-xs text-slate-500">7:00 AM to 6:00 PM</p>
                </div>
             </div>
          </div>
        </div>

      </div>
    </div>
  </main>
</body>
</html>
